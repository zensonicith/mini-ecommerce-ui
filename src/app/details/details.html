<article class="product-details" *ngIf="product$ | async as product">
    <img class="product-details__image" [src]="product.imageUrl" [alt]="'Photo of ' + product.productName" />

    <section class="product-details__content">
        <h2 class="product-details__title">{{ product.productName }}</h2>

        <ul class="product-details__features">
            <li class="product-details__feature">
                Price: $ {{ product.price | number:'1.2-2' }}
            </li>

            <li class="product-details__feature">
                Units available: {{ product.unit }} pieces
            </li>
        </ul>
        <button class="product-details__add-button" (click)="addToCart(product.id)">
            Add to cart
        </button>
    </section>
</article>
