<div class="login">
    <h2 class="login__title">Login</h2>
    <form [formGroup]="loginForm" (submit)="submitLogin()" class="login__form">
        <div class="login__field">
            <label class="login__label" for="username">Username: </label>
            <input class="login__input" type="text" id="username" name="username" formControlName="username" />
        </div>
        <div class="login__field">
            <label class="login__label" for="password">Password: </label>
            <input class="login__input" type="password" id="password" name="password" formControlName="password" />
        </div>
        <button class="login__button" type="submit">Login</button>
        <a routerLink="/register" class="login__link">Don't have an account? Register</a>
    </form>
    @if (getErrorMessage()) {
        <div class="login__error">{{ getErrorMessage() }}</div>
    }
</div>
